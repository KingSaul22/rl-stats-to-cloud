<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SAVETX - Rocket League Telemetry</title>
    <script type="module" src="/src/main.js" defer></script>
  </head>

  <body>
    <main class="app-shell">
      <header class="app-header">
        <h1>SAVETX - Rocket League Telemetry</h1>
      </header>

      <section class="panel" aria-labelledby="status-title">
        <h2 id="status-title">Status</h2>
        <div class="status-grid">
          <p>
            <span class="label">Connection:</span>
            <span id="connection-status" class="status-chip waiting">Waiting</span>
          </p>
          <p>
            <span class="label">Last Event:</span>
            <span id="last-event">None</span>
          </p>
        </div>
      </section>

      <section class="panel" aria-labelledby="config-title">
        <h2 id="config-title">Configuration</h2>
        <form id="config-form" class="config-form" autocomplete="off">
          <label for="connector-type">Connector Type</label>
          <select id="connector-type" name="connector_type" required>
            <option value="Firebase">Firebase RTDB</option>
          </select>

          <label for="connector-url">Database URL</label>
          <input
            id="connector-url"
            name="connector_url"
            type="text"
            placeholder="https://your-project.firebaseio.com"
            required
          />

          <label for="connector-auth-token">Auth Token</label>
          <input
            id="connector-auth-token"
            name="connector_auth_token"
            type="password"
            placeholder="Enter auth token"
          />

          <label for="reconnect-delay-seconds">Reconnect Delay (seconds)</label>
          <input
            id="reconnect-delay-seconds"
            name="reconnect_delay_seconds"
            type="number"
            min="1"
            step="1"
            required
          />

          <div class="form-actions">
            <button id="save-config" type="submit">Save Configuration</button>
            <span id="save-status" class="save-status" role="status" aria-live="polite"></span>
          </div>
        </form>
      </section>
    </main>
  </body>
</html>
